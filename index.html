<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-input">
        <h1>⚔️Tic-Tac-Toe⚔️</h1>
        <form action="">
            <input type="text" name="player-one" id="player-one"  placeholder="Player 1">
            <input type="text" name="player-two" id="player-two" placeholder="Player 2">
        </form>
        <button onclick="screenController()">Start!</button>
    </div>
    <div class="game-container">
        <div class="board"></div>
    </div>
    <script src="game.js" defer></script>
</body>
</html>
